when:
  - event: push
    branch: main
  - event: cron
  - event: manual

steps:
  semantic_release:
    image: node:26-alpine
    environment:
      GH_TOKEN:
        from_secret: perso_token
      GIT_AUTHOR_NAME: semantic-release
      GIT_AUTHOR_EMAIL: semantic-release@users.noreply.github.com
      GIT_COMMITTER_NAME: semantic-release
      GIT_COMMITTER_EMAIL: semantic-release@users.noreply.github.com
    commands:
      - apk add --no-cache git
      - npx --yes --package semantic-release@25.0.5 --package @semantic-release/commit-analyzer@13.0.1 --package @semantic-release/release-notes-generator@14.1.1 --package @semantic-release/exec@7.1.0 --package @semantic-release/github@12.0.8 --package conventional-changelog-conventionalcommits@9.3.1 semantic-release
    when:
      - event: push
        branch: main

  build_trigger_bridge:
    image: woodpeckerci/plugin-docker-buildx:6.1.0
    depends_on: [semantic_release]
    backend_options:
      kubernetes:
        dnsPolicy: None
        dnsConfig:
          nameservers:
            - 1.1.1.1
            - 9.9.9.9
    settings:
      registry: ghcr.io
      repo: ghcr.io/lkshrk/woodpecker-ops/renovate-trigger-bridge
      dockerfile: renovate-trigger-bridge/Dockerfile
      context: .
      platforms: linux/amd64,linux/arm64
      tags_file: .tags
      username:
        from_secret: perso_user
      password:
        from_secret: perso_token
    when:
      - event: push
        branch: main

  renovate_webdev_harke:
    image: renovate/renovate:latest
    environment:
      GITHUB_APP_ID:
        from_secret: github_app_id
      GITHUB_APP_PRIVATE_KEY_B64:
        from_secret: github_app_private_key_b64
      GITHUB_APP_INSTALLATION_ID:
        from_secret: github_app_installation_id_webdev_harke
      RENOVATE_REPOSITORY_OWNER: webdev-harke
      DOCKERHUB_USERNAME:
        from_secret: docker_user
      DOCKERHUB_PASSWORD:
        from_secret: docker_token
      RENOVATE_DOCKER_USERNAME:
        from_secret: docker_user
      RENOVATE_DOCKER_PASSWORD:
        from_secret: docker_token
      GHCR_USERNAME:
        from_secret: perso_user
      GHCR_PASSWORD:
        from_secret: perso_token
      RENOVATE_CONFIG_FILE: renovate/config.js
      LOG_LEVEL: info
    commands:
      - if [ -z "$RENOVATE_REPOSITORIES" ] && [ "$RENOVATE_RUN_ALL" != "true" ]; then echo "Set RENOVATE_REPOSITORIES for a targeted run or RENOVATE_RUN_ALL=true after target repo pipelines are removed."; exit 0; fi
      - if [ -n "$RENOVATE_REPOSITORIES" ] && ! printf '%s' "$RENOVATE_REPOSITORIES" | tr ',' '\n' | grep -q "^$RENOVATE_REPOSITORY_OWNER/"; then echo "No $RENOVATE_REPOSITORY_OWNER repositories requested."; exit 0; fi
      - if [ "$RENOVATE_RUN_ALL" = "true" ] && { [ -z "$RENOVATE_DOCKER_USERNAME" ] || [ -z "$RENOVATE_DOCKER_PASSWORD" ]; }; then echo "Set Woodpecker secrets docker_user and docker_token before full Renovate runs."; exit 1; fi
      - export RENOVATE_TOKEN="$(node renovate/github-app-token.js)"
      - renovate

  renovate_lkshrk:
    image: renovate/renovate:latest
    environment:
      GITHUB_APP_ID:
        from_secret: github_app_id
      GITHUB_APP_PRIVATE_KEY_B64:
        from_secret: github_app_private_key_b64
      GITHUB_APP_INSTALLATION_ID:
        from_secret: github_app_installation_id_lkshrk
      RENOVATE_REPOSITORY_OWNER: lkshrk
      DOCKERHUB_USERNAME:
        from_secret: docker_user
      DOCKERHUB_PASSWORD:
        from_secret: docker_token
      RENOVATE_DOCKER_USERNAME:
        from_secret: docker_user
      RENOVATE_DOCKER_PASSWORD:
        from_secret: docker_token
      GHCR_USERNAME:
        from_secret: perso_user
      GHCR_PASSWORD:
        from_secret: perso_token
      RENOVATE_CONFIG_FILE: renovate/config.js
      LOG_LEVEL: info
    commands:
      - if [ -z "$RENOVATE_REPOSITORIES" ] && [ "$RENOVATE_RUN_ALL" != "true" ]; then echo "Set RENOVATE_REPOSITORIES for a targeted run or RENOVATE_RUN_ALL=true after target repo pipelines are removed."; exit 0; fi
      - if [ -n "$RENOVATE_REPOSITORIES" ] && ! printf '%s' "$RENOVATE_REPOSITORIES" | tr ',' '\n' | grep -q "^$RENOVATE_REPOSITORY_OWNER/"; then echo "No $RENOVATE_REPOSITORY_OWNER repositories requested."; exit 0; fi
      - if [ "$RENOVATE_RUN_ALL" = "true" ] && { [ -z "$RENOVATE_DOCKER_USERNAME" ] || [ -z "$RENOVATE_DOCKER_PASSWORD" ]; }; then echo "Set Woodpecker secrets docker_user and docker_token before full Renovate runs."; exit 1; fi
      - export RENOVATE_TOKEN="$(node renovate/github-app-token.js)"
      - renovate

reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
    ignore_branches:
      - "^renovate/"
high_level_summary: true
  poem: true
  review_status: true
  collapse_walkthrough: true
  path_filters:
    - "!**/package-lock.json"
    - "!**/pnpm-lock.yaml"
    - "!**/yarn.lock"
    - "!**/bun.lockb"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/.svelte-kit/**"
    - "!**/coverage/**"
    - "!**/*.min.js"
    - "!**/*.generated.*"
    - "!**/generated/**"
